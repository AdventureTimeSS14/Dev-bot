name: Notify Discord on Multiple Commits

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send all commit messages to Discord
        run: |
            for COMMIT_SHA in $(git rev-list ${{ github.event.before }}..${{ github.event.after }}); do
              SHORT_SHA=$(git show -s --format="%h" $COMMIT_SHA)
              AUTHOR=$(git show -s --format="%an" $COMMIT_SHA)
              DATE=$(git show -s --format="%cd" --date=iso-strict $COMMIT_SHA)
              MESSAGE=$(git show -s --format="%B" $COMMIT_SHA)
        
              # Формируем JSON безопасно
              PAYLOAD=$(jq -n \
                --arg title "Коммит $SHORT_SHA" \
                --arg url "https://github.com/${{ github.repository }}/commit/$COMMIT_SHA" \
                --arg author "$AUTHOR" \
                --arg date "$DATE" \
                --arg message "$MESSAGE" \
                '{
                  embeds: [{
                    title: $title,
                    url: $url,
                    description: ("**Автор:** \($author)\n**Дата:** \($date)\n**Сообщение:**\n```" + $message + "```"),
                    color: 10181046
                  }]
                }'
              )
        
              curl -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD"
            done
        env:
            DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
