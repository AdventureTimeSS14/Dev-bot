name: Notify Discord on Multiple Commits

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send all commit messages to Discord
        run: |
            for COMMIT_SHA in $(git rev-list ${{ github.event.before }}..${{ github.event.after }}); do
              SHORT_SHA=$(git show -s --format="%h" $COMMIT_SHA)
              AUTHOR_NAME=$(git show -s --format="%an" $COMMIT_SHA)
              COMMIT_DATE=$(git show -s --format="%cd" --date=format:"%Y-%m-%d %H:%M" $COMMIT_SHA)
              COMMIT_MESSAGE=$(git show -s --format="%B" $COMMIT_SHA)
              COMMIT_URL="https://github.com/${{ github.repository }}/commit/$COMMIT_SHA"
        
              JSON_PAYLOAD=$(jq -n \
                --arg title "🟣 Новый коммит в ${{ github.repository }}" \
                --arg url "$COMMIT_URL" \
                --arg description "**Автор:** $AUTHOR_NAME\n**Дата:** $COMMIT_DATE\n**Сообщение:**\n```$COMMIT_MESSAGE```" \
                '{
                  embeds: [{
                    title: $title,
                    url: $url,
                    description: $description,
                    color: 10181046
                  }]
                }'
              )
        
              curl -X POST "$DISCORD_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "$JSON_PAYLOAD"
            done
        env:
            DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}