name: Notify Discord on Multiple Commits

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Send all commit messages to Discord
        run: |
          for COMMIT_SHA in $(git rev-list --reverse ${{ github.event.before }}..${{ github.event.after }}); do
            SHORT_SHA=$(git show -s --format="%h" $COMMIT_SHA)
            AUTHOR_NAME=$(git show -s --format="%an" $COMMIT_SHA)
            COMMIT_DATE=$(git show -s --format="%cd" --date=format:"%Y-%m-%d %H:%M" $COMMIT_SHA)
            COMMIT_MESSAGE=$(git show -s --format="%B" $COMMIT_SHA)
            COMMIT_URL="https://github.com/${{ github.repository }}/commit/$COMMIT_SHA"

            COMMIT_MESSAGE_ESCAPED=$(printf '%s' "$COMMIT_MESSAGE" | jq -Rs .)
            TITLE="🟣 [$SHORT_SHA] Новый коммит в ${{ github.repository }}"

            JSON_PAYLOAD=$(jq -n \
              --arg title "$TITLE" \
              --arg url "$COMMIT_URL" \
              --arg author "$AUTHOR_NAME" \
              --arg date "$COMMIT_DATE" \
              --argjson message "$COMMIT_MESSAGE_ESCAPED" \
              '{
                embeds: [{
                  title: $title,
                  url: $url,
                  description: "**Автор:** \($author)\n**Дата:** \($date)\n**Сообщение:**\n```\($message)```",
                  color: 10181046
                }]
              }'
            )

            curl -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "$JSON_PAYLOAD"
          done
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Send DMs about new commits to MY_USER_ID
        env:
          DISCORD_KEY: ${{ secrets.DISCORD_KEY }}
          MY_USER_ID: "328502766622474240"
        run: |
          set -e
          if [ -z "${DISCORD_KEY}" ]; then
            echo "DISCORD_KEY secret is not set. Skipping DM step."
            exit 0
          fi
          BEFORE=${{ github.event.before }}
          AFTER=${{ github.event.after }}
          COMMITS=$(git rev-list --reverse "$BEFORE..$AFTER")
          if [ -z "$COMMITS" ]; then
            echo "No commits to DM"
            exit 0
          fi

          DM_CREATE_RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bot $DISCORD_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"recipient_id\": \"$MY_USER_ID\"}" \
            https://discord.com/api/v10/users/@me/channels)
          DM_CHANNEL_ID=$(echo "$DM_CREATE_RESPONSE" | jq -r '.id')
          if [ "$DM_CHANNEL_ID" = "null" ] || [ -z "$DM_CHANNEL_ID" ]; then
            echo "Failed to get DM channel id"
            echo "$DM_CREATE_RESPONSE"
            exit 0
          fi

          for COMMIT_SHA in $COMMITS; do
            SHORT_SHA=$(git show -s --format="%h" $COMMIT_SHA)
            AUTHOR_NAME=$(git show -s --format="%an" $COMMIT_SHA)
            COMMIT_DATE=$(git show -s --format="%cd" --date=format:"%Y-%m-%d %H:%M" $COMMIT_SHA)
            COMMIT_MESSAGE=$(git show -s --format="%B" $COMMIT_SHA)
            COMMIT_URL="https://github.com/${{ github.repository }}/commit/$COMMIT_SHA"

            MESSAGE_JSON=$(jq -n \
              --arg short "$SHORT_SHA" \
              --arg url "$COMMIT_URL" \
              --arg author "$AUTHOR_NAME" \
              --arg date "$COMMIT_DATE" \
              --arg message "$COMMIT_MESSAGE" \
              '{
                embeds: [{
                  title: ("🟣 [" + $short + "] Новый коммит"),
                  url: $url,
                  description: ("**Автор:** " + $author + "\n**Дата:** " + $date + "\n" + $url + "\n\n```" + $message + "```"),
                  color: 10181046
                }]
              }'
            )

            curl -sS -X POST \
              -H "Authorization: Bot $DISCORD_KEY" \
              -H "Content-Type: application/json" \
              -d "$MESSAGE_JSON" \
              https://discord.com/api/v10/channels/$DM_CHANNEL_ID/messages > /dev/null
          done